<div
  class="container-fluid"
  [ngClass]="data.type === 'Back' ? 'back-bet' : 'lay-bet'">

  <!-- 🔄 LOADER OVERLAY -->
  <div class="loader-overlay" *ngIf="isLoading">
    <div class="loader-box">
      <div class="spinner-border text-light" role="status"></div>
      <div class="mt-2 text-white">Placing bet...</div>
    </div>
  </div>

  <!-- RATE + STAKE -->
  <div class="d-flex justify-content-between pt-2 mb-2">
    <div class="d-flex justify-content-center align-items-center rate-div" style="width: 48%;">
      <div><span class="btn btn-primary material-symbols-outlined p-1">remove</span></div>
      <div>
        <input
          type="text"
          readonly
          [(ngModel)]="price"
          class="form-control form-control-sm">
      </div>
      <div><span class="btn btn-primary material-symbols-outlined p-1">add</span></div>
    </div>

    <div class="d-flex justify-content-center align-items-center stake-div" style="width: 48%;">
      <div (click)="decre()">
        <span class="btn btn-primary material-symbols-outlined p-1">remove</span>
      </div>
      <div>
        <input
          type="number"
          style="color:black"
          [(ngModel)]="count"
          (ngModelChange)="calculate()"
          placeholder="0"
          step="1"
          class="form-control form-control-sm">
      </div>
      <div (click)="incre()">
        <span class="btn btn-primary material-symbols-outlined p-1">add</span>
      </div>
    </div>
  </div>

  <!-- QUICK STAKE BUTTONS -->
  <table class="mytable w-100">
    <tr>
      <td><div class="btn text-dark mytable-tr" (click)="incre(100)">+ 100</div></td>
      <td><div class="btn text-dark mytable-tr" (click)="incre(300)">+ 300</div></td>
      <td><div class="btn text-dark mytable-tr" (click)="incre(500)">+ 500</div></td>
    </tr>
    <tr>
      <td><div class="btn text-dark mytable-tr" (click)="incre(1000)">+ 1000</div></td>
      <td><div class="btn text-dark mytable-tr" (click)="incre(5000)">+ 5000</div></td>
      <td><div class="btn text-dark mytable-tr" (click)="incre(100000)">+ 100000</div></td>
    </tr>
  </table>

  <!-- ACTION BUTTONS -->
  <div class="d-flex mt-3 justify-content-between pb-2">
    <button
      style="background:#fff;border:1px solid #495057;width:50%;"
      class="btn btn-outline"
      (click)="closebetslipcomponent()">
      CANCEL
    </button>

    <button
      style="background:#434D56;color:#fff;width:50%;"
      class="btn"
      (click)="openTimerOverlay()"
      [disabled]="submitted_disabled">
      PLACE BET
    </button>
  </div>
</div>
