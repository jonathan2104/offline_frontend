<div class="d-flex flex-column align-items-center justify-content-center"
  style="width: 100%;  margin: auto; ">
  <div class="card"
  style="width: 100%;background-color: #000000BF; height: 580px; background-repeat: no-repeat; background-size: cover; background-position: center; border-radius: 1px; padding: 20px; border: 2px solid #F26C20;">
  <div class="d-flex justify-content-end">
    <button (click)="closeDialog()" class="material-symbols-outlined"
    style="cursor: pointer; color: red; background: none; border: none;">
    cancel
  </button>
</div>
<div class="d-flex justify-content-center mb-2">

  <img src="./../../../assets/images/jogobet_new.png" alt="" class="logo-image">
</div>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="card-body text-center"
        style=" width:350px; max-width: 100% ;border: none; border-radius: 15px; padding: 20px;">

        <!-- <span (click)="closeDialog()" class="material-symbols-outlined float-right text-red">
          cancel
        </span> -->

        <p *ngIf="errorMsg"
          class="alert alert-danger alert-dismissible fade show">
          {{ errorMsg }}
        </p>

        <!-- <div class="logo-container mb-4">
          <div class="login-logo"
            style="background-color: transparent; padding: 10px; border-radius: 15px;">
            <h3 style="color: #000000;">SIGN IN</h3>
          </div>
        </div> -->

        <div class="form-group mb-2">
          <input type="text" class="form-control w-100"
            id="exampleInputUsername1" placeholder="Username"
            formControlName="username" />
          <div
            *ngIf="(loginFormControl.username.touched || submitted) && loginFormControl.username.errors?.required"
            class="help-block">
            <div>Username is required</div>
          </div>
        </div>

        <div class="form-group mb-4">
          <input type="password" class="form-control w-100"
            id="exampleInputPassword1" placeholder="Password"
            formControlName="password" />
          <div
            *ngIf="(loginFormControl.password.touched || submitted) && loginFormControl.password.errors?.required"
            class="help-block">
            <div>Password is required</div>
          </div>
        </div>

        <button class="btn btn-block"
          style=" color: white; margin-bottom: 10px;font-weight: 300;"
          type="submit">LOGIN</button>
        <!-- <button class="btn btn-block"
          style="background-color: #a68921; color: white; margin-bottom: 10px;"
          routerLink="/signup">SIGNUP</button> -->
        <button class="btn btn-block demo-btn"
          style=" color: white; margin-bottom: 10px;"
          type="button" (click)="demologin()">DEMO LOGIN</button>
        <!-- <a href="#" class="btn btn-link"
          style="background-color: #a68921; color: #050505; display: block; margin-bottom: 10px;">Forgot
          Password?</a>
        <p class="text-center"
          style="color: #0a0a0a; font-weight: 800; font-size: 15px;">jogobetofficial@gmail.com</p> -->
          <div class="divider">
            <span>OR</span>
          </div>
          
          <div class="d-flex" style="display: flex; justify-content: center; align-items: center;">
            <div class="info-icons">
              <img src="../../../assets/icons/money.png" alt="">
              <span>Diamond Upgrade</span>
            </div>
            <div class="info-icons">
              <img src="../../../assets/icons/support.png" alt="">
              <span>1 to 1 customer support</span>
            </div>
            <div class="info-icons">
              <img src="../../../assets/icons/24X7.png" alt="">
              <span>24/7 instatnt withdrawal</span>
            </div>
          </div>

          <button class="btn btn-block whatsapp-btn">WHATSAPP NOW</button>
          <div class="bottom-info">For whitelabel enquiry, please contact</div>
      </div>
    </form>
  </div>
</div>
